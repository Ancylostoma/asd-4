name: 🧺 Compilar APK LaundryManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # también se puede lanzar manualmente desde GitHub

jobs:
  build:
    name: Build APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 📱 Instalar SDK Android 36
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      - name: 🔧 Generar Gradle Wrapper (faltaba en el repo)
        run: |
          GRADLE_VERSION=9.3.1
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O gradle.zip
          unzip -q gradle.zip -d /tmp/gradle_install
          /tmp/gradle_install/gradle-${GRADLE_VERSION}/bin/gradle wrapper \
            --gradle-version $GRADLE_VERSION \
            --distribution-type bin
          chmod +x gradlew

      - name: 🔑 Crear .env con API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY:-placeholder_key}" > .env

      - name: 🛠️ Corregir build.gradle.kts
        run: |
          # Quitar signingConfig que necesita keystore físico
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts
          sed -i '/signingConfig = signingConfigs.getByName("release")/d' app/build.gradle.kts
          echo "✅ build.gradle.kts corregido"

      - name: 🏗️ Compilar APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: 📦 Renombrar APK
        run: |
          mkdir -p apk_output
          cp app/build/outputs/apk/debug/*.apk \
             apk_output/LaundryManager-v1.0-$(date +%Y%m%d).apk

      - name: ⬇️ Publicar APK como descargable
        uses: actions/upload-artifact@v4
        with:
          name: LaundryManager-APK
          path: apk_output/*.apk
          retention-days: 90

      - name: 📋 Mostrar ruta del APK
        run: |
          echo "✅ APK compilada exitosamente:"
          ls -lh apk_output/
